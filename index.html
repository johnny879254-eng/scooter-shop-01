<!DOCTYPE html>
<!-- saved from url=(0036)file:///D:/MyDate/Desktop/index.html -->
<html lang="zh-Hant"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
  
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>代步車借出登記系統</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Noto Sans TC", "Microsoft JhengHei", Arial, sans-serif;
      background: #f3f6fb;
      color: #1f2937;
      line-height: 1.6;
    }
    .wrap {
      max-width: 520px;
      margin: 0 auto;
      padding: 18px 14px 40px;
    }
    .card {
      background: #fff;
      border-radius: 22px;
      padding: 24px 18px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, .08);
    }
    h1 {
      font-size: 34px;
      line-height: 1.15;
      margin: 10px 0 8px;
      letter-spacing: -1px;
      color: #111827;
    }
    .sub {
      font-size: 22px;
      color: #6b7280;
      margin-bottom: 24px;
    }
    label.title {
      display: block;
      font-size: 22px;
      font-weight: 700;
      margin: 18px 0 8px;
    }
    input, select {
      width: 100%;
      height: 58px;
      border: 1.5px solid #d1d5db;
      border-radius: 12px;
      padding: 0 16px;
      font-size: 22px;
      background: #fff;
      color: #111827;
    }
    input[readonly] { background: #f9fafb; color:#6b7280; }
    .section-title {
      font-size: 23px;
      font-weight: 800;
      margin: 28px 0 12px;
    }
    .terms {
      display: grid;
      gap: 12px;
    }
    .term {
      display: grid;
      grid-template-columns: 34px 1fr;
      gap: 10px;
      align-items: start;
      padding: 14px 12px;
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      background: #fff;
      font-size: 20px;
      line-height: 1.55;
    }
    .term input {
      width: 26px;
      height: 26px;
      margin-top: 4px;
    }
    .note {
      color: #6b7280;
      font-size: 19px;
      margin: 20px 0 12px;
    }
    .upload {
      border: 2px dashed #d1d5db;
      border-radius: 16px;
      height: 150px;
      display: grid;
      place-items: center;
      color: #6b7280;
      font-size: 22px;
      text-align: center;
      padding: 10px;
      background:#fafafa;
      cursor: pointer;
      overflow: hidden;
    }
    .upload img { max-width: 100%; max-height: 100%; border-radius: 10px; }
    #licenseFile { display:none; }
    .sigbox {
      border: 2px solid #2563eb;
      border-radius: 12px;
      width: 100%;
      height: 190px;
      background: #fff;
      touch-action: none;
    }
    .sig-actions {
      display:flex;
      justify-content: space-between;
      align-items:center;
      margin: 6px 0 0;
      color:#9ca3af;
      font-size:18px;
    }
    .clear {
      border:0;
      background:transparent;
      color:#9ca3af;
      font-size:18px;
      text-decoration: underline;
    }
    .btn {
      margin-top: 24px;
      width:100%;
      border:0;
      border-radius:14px;
      background:#2563eb;
      color:white;
      font-size:28px;
      font-weight:800;
      padding:18px 12px;
      cursor:pointer;
    }
    .btn:active { transform: scale(.99); }
    .result {
      display:none;
      margin-top:18px;
      padding:14px;
      border-radius:12px;
      background:#ecfdf5;
      color:#065f46;
      font-size:19px;
      white-space: pre-wrap;
    }
    .small { font-size:16px; color:#6b7280; margin-top:12px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>代步車登記系統</h1>
      <div class="sub">請確認資訊並完成登記</div>

      <label class="title">登記日期</label>
      <input id="date" readonly="">

      <label class="title">您的車牌號碼（原車）</label>
      <input id="ownerPlate" placeholder="例如：ABC-1234">

      <label class="title">借出之代步車車牌</label>
      <input id="loanPlate" placeholder="例如：EB2-567">

      <label class="title">取車店家</label>
      <select id="store">
        <option value="">請選擇店家</option>
        <option>總店</option>
        <option>分店</option>
      </select>

      <div class="section-title">請直接詳讀以下內容並完成打勾確認：</div>
      <div class="terms" id="terms"><label class="term"><input type="checkbox" class="termCheck"><span>1. 我已確認本人持有有效機車駕照，且駕照未遭吊扣、吊銷或註銷。</span></label><label class="term"><input type="checkbox" class="termCheck"><span>2. 本人目前意識清醒，未飲酒、未施用毒品、藥物或其他足以影響安全駕駛之物品。</span></label><label class="term"><input type="checkbox" class="termCheck"><span>3. 本人確認借用代步車期間，僅限本人親自騎乘使用，不得轉借、交由他人騎乘或提供無照者使用。</span></label><label class="term"><input type="checkbox" class="termCheck"><span>4. 借用期間如有違規、事故、罰單、扣點、毒駕、酒駕、拖吊、保管、車損、第三人損害等責任，均由本人自行負責，與出借車輛之車行無關。</span></label><label class="term"><input type="checkbox" class="termCheck"><span>5. 若有罰單移轉、事故處理、警方調查、保險理賠或相關行政程序需求，本人願配合提供身分資料、駕照資料及相關文件。</span></label><label class="term"><input type="checkbox" class="termCheck"><span>6. 本人借用前已確認代步車外觀與基本車況，若有異常應於借用前主動告知店家；借用後產生之新增損壞，應由本人負責。</span></label><label class="term"><input type="checkbox" class="termCheck"><span>7. 本人應遵守交通法規，並依正常方式使用代步車，不得競速、改裝、載運危險物品、超載、違規停放或從事非一般代步用途。</span></label><label class="term"><input type="checkbox" class="termCheck"><span>8. 本人應妥善保管代步車鑰匙與車輛，若有遺失、失竊、毀損或其他損害，願負擔相關修復、補發、拖吊或處理費用。</span></label><label class="term"><input type="checkbox" class="termCheck"><span>9. 本人同意於約定時間內歸還代步車，若逾期未還，願配合店家聯繫並負擔因此產生之相關費用或損害。</span></label><label class="term"><input type="checkbox" class="termCheck"><span>10. 本人已上傳駕照正面照片，並確認所提供資料均為本人真實資料，若有不實，願自負相關法律責任。</span></label></div>

      <div class="note">本人已詳閱並同意以上代步車借用規範。請勾選確認後並上傳本人駕照，即表示本人同意上述內容。</div>

      <label class="title">📷 上傳駕照正面照片 <span style="color:#ef4444">*</span></label>
      <label class="upload" for="licenseFile" id="uploadBox">點擊拍照或選擇圖片</label>
      <input id="licenseFile" type="file" accept="image/*" capture="environment">

      <label class="title">✍️ 本人簽名 <span style="color:#ef4444">*</span></label>
      <canvas id="sig" class="sigbox" width="456" height="190"></canvas>
      <div class="sig-actions">
        <span>請用手指在上方框內簽名</span>
        <button class="clear" type="button" onclick="clearSig()">清除重簽</button>
      </div>

      <button class="btn" onclick="submitForm()">我同意並送出代步車借用登記</button>
      <div class="result" id="result"></div>
      <div class="small">第一版為前端表單範本。正式上線若要保存資料，建議接 Google 表單、Google Sheet、LINE LIFF 或後台資料庫。</div>
    </div>
  </div>

<script>
const termsText = [
  "我已確認本人持有有效機車駕照，且駕照未遭吊扣、吊銷或註銷。",
  "本人目前意識清醒，未飲酒、未施用毒品、藥物或其他足以影響安全駕駛之物品。",
  "本人確認借用代步車期間，僅限本人親自騎乘使用，不得轉借、交由他人騎乘或提供無照者使用。",
  "借用期間如有違規、事故、罰單、扣點、毒駕、酒駕、拖吊、保管、車損、第三人損害等責任，均由本人自行負責，與出借車輛之車行無關。",
  "若有罰單移轉、事故處理、警方調查、保險理賠或相關行政程序需求，本人願配合提供身分資料、駕照資料及相關文件。",
  "本人借用前已確認代步車外觀與基本車況，若有異常應於借用前主動告知店家；借用後產生之新增損壞，應由本人負責。",
  "本人應遵守交通法規，並依正常方式使用代步車，不得競速、改裝、載運危險物品、超載、違規停放或從事非一般代步用途。",
  "本人應妥善保管代步車鑰匙與車輛，若有遺失、失竊、毀損或其他損害，願負擔相關修復、補發、拖吊或處理費用。",
  "本人同意於約定時間內歸還代步車，若逾期未還，願配合店家聯繫並負擔因此產生之相關費用或損害。",
  "本人已上傳駕照正面照片，並確認所提供資料均為本人真實資料，若有不實，願自負相關法律責任。"
];

document.getElementById("date").value = new Date().toISOString().slice(0,10);
const terms = document.getElementById("terms");
termsText.forEach((t,i)=>{
  const div = document.createElement("label");
  div.className = "term";
  div.innerHTML = `<input type="checkbox" class="termCheck"><span>${i+1}. ${t}</span>`;
  terms.appendChild(div);
});

document.getElementById("licenseFile").addEventListener("change", e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    document.getElementById("uploadBox").innerHTML = `<img src="${ev.target.result}" alt="駕照照片">`;
  };
  reader.readAsDataURL(file);
});

const canvas = document.getElementById("sig");
const ctx = canvas.getContext("2d");
let drawing = false, signed = false;

function resizeCanvas() {
  const rect = canvas.getBoundingClientRect();
  const img = ctx.getImageData(0,0,canvas.width||1,canvas.height||1);
  canvas.width = rect.width * devicePixelRatio;
  canvas.height = rect.height * devicePixelRatio;
  ctx.scale(devicePixelRatio, devicePixelRatio);
  ctx.lineWidth = 3;
  ctx.lineCap = "round";
  ctx.strokeStyle = "#111827";
}
setTimeout(resizeCanvas, 100);
window.addEventListener("resize", resizeCanvas);

function pos(e) {
  const r = canvas.getBoundingClientRect();
  const p = e.touches ? e.touches[0] : e;
  return { x: p.clientX - r.left, y: p.clientY - r.top };
}
function start(e){ drawing = true; signed = true; const p=pos(e); ctx.beginPath(); ctx.moveTo(p.x,p.y); e.preventDefault(); }
function move(e){ if(!drawing) return; const p=pos(e); ctx.lineTo(p.x,p.y); ctx.stroke(); e.preventDefault(); }
function end(){ drawing = false; }
canvas.addEventListener("mousedown", start);
canvas.addEventListener("mousemove", move);
canvas.addEventListener("mouseup", end);
canvas.addEventListener("mouseleave", end);
canvas.addEventListener("touchstart", start, {passive:false});
canvas.addEventListener("touchmove", move, {passive:false});
canvas.addEventListener("touchend", end);

function clearSig(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  signed = false;
}

function submitForm(){
  const ownerPlate = document.getElementById("ownerPlate").value.trim();
  const loanPlate = document.getElementById("loanPlate").value.trim();
  const store = document.getElementById("store").value;
  const checks = [...document.querySelectorAll(".termCheck")];
  const file = document.getElementById("licenseFile").files[0];

  if(!ownerPlate || !loanPlate || !store){ alert("請填寫車牌與取車店家"); return; }
  if(checks.some(c=>!c.checked)){ alert("請完成所有條款勾選"); return; }
  if(!file){ alert("請上傳駕照正面照片"); return; }
  if(!signed){ alert("請完成本人簽名"); return; }

  const data = {
    登記日期: document.getElementById("date").value,
    原車車牌: ownerPlate,
    代步車車牌: loanPlate,
    取車店家: store,
    送出時間: new Date().toLocaleString("zh-TW")
  };
  localStorage.setItem("loanBikeRecord_" + Date.now(), JSON.stringify(data));
  const result = document.getElementById("result");
  result.style.display = "block";
  result.textContent = "已完成送出（範本紀錄已暫存在此手機瀏覽器）\n\n" + JSON.stringify(data, null, 2);
  result.scrollIntoView({behavior:"smooth"});
}
</script>


</body></html>
