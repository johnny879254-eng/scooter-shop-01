<!DOCTYPE html>
<html lang="zh-Hant"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"><title>代步車借出登記系統</title><style>*{box-sizing:border-box}body{margin:0;font-family:"Microsoft JhengHei",Arial,sans-serif;background:#f3f6fb;color:#1f2937}.wrap{max-width:520px;margin:auto;padding:14px 12px 36px}.card{background:#fff;border-radius:20px;padding:22px 18px}h1{font-size:30px;margin:6px 0}.sub{font-size:19px;color:#6b7280}label.title{display:block;font-size:20px;font-weight:800;margin:16px 0 7px}input,select{width:100%;height:54px;border:1.5px solid #d1d5db;border-radius:12px;padding:0 14px;font-size:20px}.term{display:grid;grid-template-columns:30px 1fr;gap:8px;padding:12px 10px;border:1px solid #e5e7eb;border-radius:14px;font-size:18px;margin:10px 0}.term input{width:24px;height:24px}.upload{border:2px dashed #d1d5db;border-radius:16px;height:140px;display:grid;place-items:center;color:#6b7280}.upload img{max-width:100%;max-height:100%}#licenseFile{display:none}.sigbox{border:2px solid #2563eb;border-radius:12px;width:100%;height:170px}.btn{margin-top:22px;width:100%;border:0;border-radius:14px;background:#2563eb;color:white;font-size:24px;font-weight:900;padding:16px}.result{display:none;margin-top:16px;padding:14px;border-radius:12px;background:#ecfdf5;color:#065f46;font-size:18px;font-weight:700}</style></head><body><div class="wrap"><div class="card"><h1>代步車借出登記系統</h1><div class="sub">請確認資訊並完成登記</div><label class="title">登記日期</label><input id="date" type="date"><label class="title">您的車牌號碼（原車）</label><input id="ownerPlate" placeholder="例如：ABC-1234"><label class="title">借出之代步車車牌</label><input id="loanPlate" placeholder="例如：EB2-567"><label class="title">取車店家</label><select id="store"><option value="">請選擇店家</option><option>總店</option><option>分店</option></select><div id="terms"></div><label class="title">📷 上傳駕照正面照片 *</label><label class="upload" for="licenseFile" id="uploadBox">點擊拍照或選擇圖片</label><input id="licenseFile" type="file" accept="image/*"><label class="title">✍️ 本人簽名 *</label><canvas id="sig" class="sigbox"></canvas><button class="btn" id="submitBtn" onclick="submitForm()">我同意並送出登記</button><div class="result" id="result">已完成送出，店家後台已保存完整 PDF 存證單。</div></div></div><script>
const GAS_WEB_APP_URL="https://script.google.com/macros/s/AKfycbySnAf6nrUsAh60b1fkC25hC9LC14Y-sQ_AXUgvsCLFcZcU3lUmc1Oq1qYPp340duCJ/exec";
const termsText=["我已確認本人持有有效機車駕照，且駕照未遭吊扣、吊銷或註銷。","本人目前意識清醒，未飲酒、未施用毒品、藥物或其他足以影響安全駕駛之物品。","本人確認借用代步車期間，僅限本人親自騎乘使用，不得轉借、交由他人騎乘或提供無照者使用。","借用期間如有違規、事故、罰單、扣點、毒駕、酒駕、拖吊、保管、車損、第三人損害等責任，均由本人自行負責。","若有罰單移轉、事故處理、警方調查、保險理賠或行政程序需求，本人願配合提供資料。","本人借用前已確認代步車外觀與基本車況，借用後新增損壞由本人負責。","本人應遵守交通法規，不得競速、改裝、超載、違規停放或非一般代步用途。","本人應妥善保管代步車鑰匙與車輛，遺失或毀損願負擔相關費用。","本人同意於約定時間內歸還代步車，逾期願負擔相關費用或損害。","本人已上傳駕照正面照片，確認資料真實，若有不實願自負法律責任。"];
document.getElementById("date").value=new Date().toISOString().slice(0,10);
termsText.forEach((t,i)=>{terms.innerHTML+=`<label class="term"><input type="checkbox" class="termCheck"><span>${i+1}. ${t}</span></label>`});
let licenseBase64="",signed=false;licenseFile.onchange=e=>{let f=e.target.files[0],r=new FileReader();r.onload=x=>{licenseBase64=x.target.result;uploadBox.innerHTML=`<img src="${x.target.result}">`};r.readAsDataURL(f)};
const canvas=sig,ctx=canvas.getContext("2d");setTimeout(()=>{let r=canvas.getBoundingClientRect();canvas.width=r.width;canvas.height=r.height;ctx.lineWidth=3;ctx.lineCap="round"},100);let d=false;function p(e){let r=canvas.getBoundingClientRect(),q=e.touches?e.touches[0]:e;return{x:q.clientX-r.left,y:q.clientY-r.top}}canvas.ontouchstart=canvas.onmousedown=e=>{d=true;signed=true;let q=p(e);ctx.beginPath();ctx.moveTo(q.x,q.y);e.preventDefault()};canvas.ontouchmove=canvas.onmousemove=e=>{if(!d)return;let q=p(e);ctx.lineTo(q.x,q.y);ctx.stroke();e.preventDefault()};canvas.ontouchend=canvas.onmouseup=()=>d=false;
async function submitForm(){let checks=[...document.querySelectorAll(".termCheck")];if(!date.value||!ownerPlate.value||!loanPlate.value||!store.value)return alert("請填寫完整資料");if(checks.some(c=>!c.checked))return alert("請完成所有條款勾選");if(!licenseBase64)return alert("請上傳駕照照片");if(!signed)return alert("請完成簽名");submitBtn.disabled=true;submitBtn.textContent="送出中";await fetch(GAS_WEB_APP_URL,{method:"POST",mode:"no-cors",headers:{"Content-Type":"text/plain"},body:JSON.stringify({登記日期:date.value,原車車牌:ownerPlate.value,代步車車牌:loanPlate.value,取車店家:store.value,條款內容:termsText,條款確認:"已全部勾選同意",送出時間:new Date().toLocaleString("zh-TW"),駕照照片:licenseBase64,本人簽名:canvas.toDataURL("image/png")})});result.style.display="block";submitBtn.textContent="已送出"}
</script></body></html>
